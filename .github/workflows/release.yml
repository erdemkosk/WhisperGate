name: WhisperGate CI & Rolling Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-linux:
    name: Build Linux Binary
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install PortAudio
        run: |
          sudo apt-get update
          sudo apt-get install -y libportaudio2 portaudio19-dev pkg-config

      - name: Build Binary
        run: |
          go build -v -o whispergate-linux-amd64

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: whispergate-linux-amd64
          path: whispergate-linux-amd64

  build-mac:
    name: Build macOS Binary
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install PortAudio
        run: |
          brew install portaudio pkg-config

      - name: Build Binary
        run: |
          go build -v -o whispergate-darwin-arm64

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: whispergate-darwin-arm64
          path: whispergate-darwin-arm64

  build-windows:
    name: Build Windows Binary
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-portaudio
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-go
            mingw-w64-x86_64-pkg-config

      - name: Build Binary
        shell: msys2 {0}
        run: |
          go build -v -o whispergate-windows-amd64.exe
          cp /mingw64/bin/libportaudio-2.dll .
          cp /mingw64/bin/libwinpthread-1.dll .
          cp /mingw64/bin/libgcc_s_seh-1.dll .

      - name: Create Zip Archive
        run: |
          Compress-Archive -Path whispergate-windows-amd64.exe, libportaudio-2.dll, libwinpthread-1.dll, libgcc_s_seh-1.dll -DestinationPath whispergate-windows-amd64.zip

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: whispergate-windows-amd64
          path: whispergate-windows-amd64.zip

  publish-release:
    name: Publish Rolling Release
    needs: [build-linux, build-mac, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download Linux Artifact
        uses: actions/download-artifact@v4
        with:
          name: whispergate-linux-amd64

      - name: Download macOS Artifact
        uses: actions/download-artifact@v4
        with:
          name: whispergate-darwin-arm64

      - name: Download Windows Artifact
        uses: actions/download-artifact@v4
        with:
          name: whispergate-windows-amd64

      - name: Create Rolling Release
        uses: marvinpinto/action-automatic-releases@latest
        with:
          repo_token: "${{ secrets.DEPLOY_TOKEN }}"
          automatic_release_tag: "latest"
          prerelease: true
          title: "WhisperGate Rolling Dev Build"
          files: |
            whispergate-linux-amd64
            whispergate-darwin-arm64
            whispergate-windows-amd64.zip
